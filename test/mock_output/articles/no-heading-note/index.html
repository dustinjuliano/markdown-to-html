<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>No Heading Note</title>
  </head>
  <body>
    <header>
      <h1>No Heading Note</h1>
    </header>
    <main>
      <p>This note has no heading at all.</p>

    </main>
